<!doctype html>

    <!-- Force hide scrollbars on mobile viewports to prevent golden line glitches -->
    <style>
      @media (max-width: 1023px) {
        ::-webkit-scrollbar {

          height: 0 !important;
        }
        html, body {
          scrollbar-width: none !important;

    </style>

    <!-- Primary Meta -->

    <!-- Twitter Card -->

    <!-- Web App Manifest -->

    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Google Fonts — Variable font format reduces payload and prevents render blocking.
    -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300..800&family=Plus+Jakarta+Sans:ital,wght@0,300..800;1,400&display=swap" rel="stylesheet" />

    <!--
      NOTE: Leaflet CSS is intentionally NOT loaded here.
      It is dynamically imported inside InteractiveMap.jsx and InteractiveGlobe.jsx
      so it is only loaded on pages that actually use the map (~40KB savings on all other pages).
    -->

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "RealEstateAgent",
      "name": "HyperRelestix",
      "description": "Pune's most trusted luxury real estate platform",
      "url": "https://www.hyperrelestix.in",
      "telephone": "+91-98765-43210",
      "email": "hello@hyperrelestix.in",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Level 12, Panchshil Tech Park",
        "addressLocality": "Yerwada",
        "addressRegion": "Pune",
        "postalCode": "411006",
        "addressCountry": "IN"
      },
      "areaServed": "Pune, Maharashtra, India",
      "priceRange": "₹₹₹₹"
    }
    </script>

    <!-- Theme initialization — runs synchronously before first paint to prevent flash -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch(e) { /* localStorage may be blocked in private mode */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
